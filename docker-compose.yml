version: '3.1'
services:
    mailhog:
        image: 'mailhog/mailhog:latest'
        ports:
            - '5578:8025'
    mailpit:
        image: 'axllent/mailpit:latest'
        ports:
            - '1026:1025' # SMTP server
            - '8026:8025' # Web UI
        restart: always

    redis:
        image: 'redis:alpine'

    mysql:
        image: 'mysql:8.0'
        working_dir: /app
        volumes:
            - db_data:/var/lib/mysql    # привязка тома к данным mysql      # '.:/app'
        #restart: always
        environment:
            - MYSQL_ROOT_PASSWORD=avb
            - MYSQL_DATABASE=langme2
            - MYSQL_USER=user
            - MYSQL_PASSWORD=123
        ports:
            - '5579:3306'

    webserver:
        image: 'nginx:alpine'
        working_dir: /app
        volumes:
            - '.:/app'
            - './phpdocker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf'
        ports:
            - '5577:80'

    php-fpm:
        build: phpdocker/php-fpm
        working_dir: /app
        volumes:
            - '.:/app'
            - './phpdocker/php-fpm/php-ini-overrides.ini:/etc/php/8.2/fpm/conf.d/99-overrides.ini'
            - './phpdocker/php-fpm/php-ini-overrides.ini:/etc/php/8.2/cli/conf.d/99-overrides.ini'

volumes:
    db_data:    #   Объявление тома
